<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>战略发展部报告库</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f5f3ef;
            --bg-card: #ffffff;
            --bg-card-hover: #fdfcfa;
            --border: #e2ddd5;
            --border-hover: #c9a84c;
            --text-primary: #1a1a1f;
            --text-secondary: #6b6870;
            --text-dim: #9a9498;
            --accent: #c9a84c;
            --accent-glow: rgba(201, 168, 76, 0.12);
            --accent-soft: rgba(201, 168, 76, 0.06);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Subtle background texture */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 0%, rgba(201, 168, 76, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(201, 168, 76, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 0 32px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            padding: 80px 0 20px;
            text-align: center;
        }

        .logo-mark {
            display: inline-block;
            width: 48px;
            height: 2px;
            background: var(--accent);
            margin-bottom: 32px;
            position: relative;
        }

        .logo-mark::before,
        .logo-mark::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border: 1.5px solid var(--accent);
            top: 50%;
            transform: translateY(-50%) rotate(45deg);
        }

        .logo-mark::before { left: -16px; }
        .logo-mark::after { right: -16px; }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--text-primary);
            margin-bottom: 16px;
            animation: fadeDown 0.8s ease-out;
        }

        .subtitle {
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-dim);
            animation: fadeDown 0.8s ease-out 0.15s both;
        }

        /* Divider */
        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin: 48px 0;
        }

        /* Section */
        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 28px;
            padding-left: 4px;
            animation: fadeDown 0.8s ease-out 0.3s both;
        }

        /* Report Cards */
        .report-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .report-card {
            display: block;
            text-decoration: none;
            color: inherit;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px 32px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            animation: fadeUp 0.6s ease-out 0.4s both;
        }

        .report-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .report-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--accent-soft), transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .report-card:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
            transform: translateX(4px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 0 80px var(--accent-glow);
        }

        .report-card:hover::before { opacity: 1; }
        .report-card:hover::after { opacity: 1; }
        .report-card:hover .card-arrow { opacity: 1; transform: translateX(0); }
        .report-card:hover .card-tag { background: var(--accent); color: var(--bg-primary); }

        .card-content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-info {
            flex: 1;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .card-desc {
            font-size: 13px;
            font-weight: 300;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .card-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 5px 12px;
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-dim);
            transition: all 0.4s ease;
            white-space: nowrap;
        }

        .card-arrow {
            font-size: 20px;
            color: var(--accent);
            opacity: 0;
            transform: translateX(-8px);
            transition: all 0.4s ease;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 64px 0 48px;
            animation: fadeUp 0.6s ease-out 0.6s both;
        }

        .footer-line {
            width: 24px;
            height: 1px;
            background: var(--text-dim);
            margin: 0 auto 16px;
        }

        footer p {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 2px;
        }

        /* Animations */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            header { padding: 56px 0 16px; }
            h1 { font-size: 28px; letter-spacing: 4px; }
            .report-card { padding: 22px 20px; }
            .card-content { flex-direction: column; align-items: flex-start; gap: 14px; }
            .card-meta { align-self: flex-end; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-mark"></div>
            <h1>战略发展部智库</h1>
            <p class="subtitle">Intelligence &amp; Research</p>
        </header>

        <div class="divider"></div>

        <p class="section-label">— Reports</p>

        <div class="report-list">
            <a href="strategy-dev-intelligence-repository.html" class="report-card">
                <div class="card-content">
                    <div class="card-info">
                        <div class="card-title">Strategy Dev Intelligence Repository</div>
                        <div class="card-desc">战略发展部行业报告库</div>
                    </div>
                    <div class="card-meta">
                        <span class="card-tag">Report</span>
                        <span class="card-arrow">→</span>
                    </div>
                </div>
            </a>

            <!-- 新增报告模板：复制下面这段，修改 href、标题和描述即可
            <a href="your-report-name.html" class="report-card">
                <div class="card-content">
                    <div class="card-info">
                        <div class="card-title">报告标题</div>
                        <div class="card-desc">报告描述</div>
                    </div>
                    <div class="card-meta">
                        <span class="card-tag">Report</span>
                        <span class="card-arrow">→</span>
                    </div>
                </div>
            </a>
            -->
        </div>

        <footer>
            <div class="footer-line"></div>
            <p>YOKA &copy; 2025</p>
        </footer>
    </div>
</body>
</html>
